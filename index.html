<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini AAPI Pro | الترسانة الكاملة</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f8f9fa; --card: #ffffff; --text: #1f1f1f; --primary: #1a73e8;
            --secondary: #f1f3f4; --user-bubble: #e8f0fe; --bot-bubble: #ffffff;
            --border: #dee2e6; --accent: linear-gradient(135deg, #1a73e8, #701af0);
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        [data-theme="dark"] {
            --bg: #131314; --card: #1e1f20; --text: #e3e3e3; --primary: #8ab4f8;
            --secondary: #2d2f31; --user-bubble: #004a77; --bot-bubble: #1e1f20;
            --border: #444746; --shadow: 0 4px 25px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        /* --- الهيدر الاحترافي --- */
        header {
            padding: 12px 24px; display: flex; justify-content: space-between;
            align-items: center; background: var(--card); border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow); z-index: 1000;
        }

        .logo { font-size: 1.4rem; font-weight: 600; background: var(--accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-tools { display: flex; gap: 12px; }
        .tool-btn {
            background: var(--secondary); border: none; color: var(--text);
            width: 42px; height: 42px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .tool-btn:hover { filter: brightness(0.9); transform: translateY(-2px); }

        /* --- لوحة الإعدادات الذكية --- */
        #settings-panel {
            background: var(--card); padding: 20px; border-bottom: 1px solid var(--border);
            display: none; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px; animation: slideDown 0.4s ease;
        }
        @keyframes slideDown { from { opacity:0; transform: translateY(-20px); } to { opacity:1; transform: translateY(0); } }

        .input-field { display: flex; flex-direction: column; gap: 5px; }
        .input-field label { font-size: 12px; font-weight: 600; opacity: 0.7; }
        input {
            background: var(--secondary); border: 1px solid var(--border);
            color: var(--text); padding: 12px; border-radius: 10px; font-size: 14px; outline: none;
        }

        /* --- منطقة الدردشة (Scrolling Engine) --- */
        #chat-viewport {
            flex-grow: 1; overflow-y: auto; padding: 30px 15% 100px;
            display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth;
        }
        @media (max-width: 800px) { #chat-viewport { padding: 20px 15px 100px; } }

        .msg-container { display: flex; flex-direction: column; max-width: 90%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } }
        
        .user-align { align-self: flex-start; }
        .bot-align { align-self: flex-end; }

        .bubble {
            padding: 16px 20px; border-radius: 24px; font-size: 16px; line-height: 1.8;
            word-wrap: break-word; white-space: pre-wrap; position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .user-align .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; border: 1px solid transparent; }
        .bot-align .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .msg-actions {
            display: flex; gap: 10px; margin-top: 8px; opacity: 0; transition: opacity 0.3s;
        }
        .msg-container:hover .msg-actions { opacity: 1; }

        .action-link {
            font-size: 12px; color: var(--primary); cursor: pointer; text-decoration: none;
            display: flex; align-items: center; gap: 4px; font-weight: 500;
        }

        /* --- الفوتر وشريط الإدخال --- */
        .footer-area {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 20px; background: linear-gradient(to top, var(--bg) 60%, transparent);
            display: flex; flex-direction: column; align-items: center;
        }

        .input-container {
            width: 100%; max-width: 800px; background: var(--card);
            border: 1px solid var(--border); border-radius: 30px;
            display: flex; align-items: center; padding: 8px 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        textarea {
            flex-grow: 1; background: transparent; border: none; color: var(--text);
            padding: 10px; font-size: 16px; resize: none; outline: none;
            max-height: 150px; min-height: 40px; font-family: inherit;
        }

        .send-btn {
            background: var(--primary); color: white; border: none;
            width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .send-btn:disabled { opacity: 0.5; filter: grayscale(1); }

        #status-bar { font-size: 12px; margin-bottom: 8px; color: var(--primary); font-weight: 600; display: none; }

    </style>
</head>
<body data-theme="light">

<header>
    <div class="logo">Gemini AAPI Pro</div>
    <div class="nav-tools">
        <button class="tool-btn" onclick="toggleSettings()" title="الإعدادات">⚙️</button>
        <button class="tool-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>
</header>

<div id="settings-panel">
    <div class="input-field">
        <label>GitHub Personal Token</label>
        <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
    </div>
    <div class="input-field">
        <label>المستودع (User/Repo)</label>
        <input type="text" id="ghRepo" placeholder="username/repository">
    </div>
</div>

<div id="chat-viewport">
    <div class="msg-container bot-align">
        <div class="bubble">مرحباً بك في نظام Gemini AAPI الكامل. قمت بإصلاح التمرير، ميزة النسخ، والوضع الليلي، مع الحفاظ على هيكلية الـ GitHub API الأصلية. اسألني أي شيء!</div>
    </div>
</div>

<div class="footer-area">
    <div id="status-bar">📡 جاري معالجة الطلب عبر GitHub Actions...</div>
    <div class="input-container">
        <textarea id="promptInput" rows="1" placeholder="اسأل Gemini..." oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="startProcess()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    // 1. إدارة الذاكرة والسمات
    window.onload = () => {
        document.getElementById('ghToken').value = localStorage.getItem('cfg_token') || '';
        document.getElementById('ghRepo').value = localStorage.getItem('cfg_repo') || '';
        const theme = localStorage.getItem('cfg_theme') || 'light';
        document.body.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').innerText = theme === 'light' ? '🌙' : '☀️';
    };

    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('cfg_theme', next);
        document.getElementById('themeBtn').innerText = next === 'light' ? '🌙' : '☀️';
    }

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'grid' ? 'none' : 'grid';
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    // 2. محرك الرسائل
    function createMessage(text, side) {
        const viewport = document.getElementById('chat-viewport');
        const container = document.createElement('div');
        container.className = `msg-container ${side}-align`;
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerText = text;
        container.appendChild(bubble);

        if(side === 'bot') {
            const actions = document.createElement('div');
            actions.className = 'msg-actions';
            actions.innerHTML = `<span class="action-link" onclick="copyText(this, \`${text.replace(/`/g, '\\`')}\`)">📋 نسخ الرد</span>`;
            container.appendChild(actions);
        }

        viewport.appendChild(container);
        viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' });
    }

    async function copyText(el, text) {
        await navigator.clipboard.writeText(text);
        const original = el.innerHTML;
        el.innerHTML = "✅ تم النسخ!";
        setTimeout(() => el.innerHTML = original, 2000);
    }

    // 3. محرك الأتمتة (GitHub Integration)
    async function startProcess() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        const input = document.getElementById('promptInput');
        const prompt = input.value.trim();

        if(!token || !repo || !prompt) return alert("برجاء ملء جميع البيانات!");

        // حفظ الإعدادات
        localStorage.setItem('cfg_token', token);
        localStorage.setItem('cfg_repo', repo);

        createMessage(prompt, 'user');
        input.value = ''; input.style.height = 'auto';
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('status-bar').style.display = 'block';

        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/gemini_api.yml/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ ref: 'main', inputs: { prompt: prompt } })
            });

            if(!res.ok) throw new Error("فشل إرسال الطلب. تحقق من التوكن وصلاحياته.");
            
            checkStatus(repo, token);
        } catch (e) {
            createMessage("❌ خطأ: " + e.message, 'bot');
            resetUI();
        }
    }

    async function checkStatus(repo, token) {
        let attempts = 0;
        const interval = setInterval(async () => {
            attempts++;
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs?per_page=1`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const run = data.workflow_runs[0];

            if(run && run.status === "completed") {
                clearInterval(interval);
                if(run.conclusion === "success") fetchArtifact(repo, run.id, token);
                else { createMessage("❌ فشل الأكشن في تنفيذ المهمة.", 'bot'); resetUI(); }
            }
            if(attempts > 30) { clearInterval(interval); resetUI(); } // مهلة 5 دقائق
        }, 8000);
    }

    async function fetchArtifact(repo, runId, token) {
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs/${runId}/artifacts`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const art = data.artifacts.find(a => a.name === 'gemini-json');

            const zipRes = await fetch(art.archive_download_url, { headers: { 'Authorization': `Bearer ${token}` } });
            const blob = await zipRes.blob();
            const jszip = new JSZip();
            const zipContent = await jszip.loadAsync(blob);
            const jsonStr = await zipContent.file("result.json").async("string");
            
            createMessage(JSON.parse(jsonStr).response, 'bot');
        } catch (e) {
            createMessage("❌ فشل جلب ملف النتيجة النهائي.", 'bot');
        } finally {
            resetUI();
        }
    }

    function resetUI() {
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('status-bar').style.display = 'none';
    }
</script>

</body>
</html>
