<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini AAPI Pro | الترسانة الكاملة</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* ألوان Gemini الأصلية الداكنة */
            --bg-color: #131314;      /* خلفية الصفحة */
            --card-color: #1e1f20;    /* فقاعة البوت */
            --user-bubble: #2d2f31;   /* فقاعة المستخدم */
            --text-main: #e3e3e3;     /* لون النص */
            --accent-blue: #8ab4f8;   /* لون الأزرار والروابط */
            --border-subtle: #444746; /* الحدود */
            --code-bg: #000000;       /* خلفية الكود السوداء */
        }

        * { box-sizing: border-box; transition: background 0.2s; }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        header {
            flex-shrink: 0; padding: 12px 24px; display: flex; justify-content: space-between;
            align-items: center; background: var(--card-color); border-bottom: 1px solid var(--border-subtle);
        }

        .logo { font-size: 1.3rem; font-weight: 600; color: var(--accent-blue); }

        .nav-tools { display: flex; gap: 10px; }
        .tool-btn {
            background: var(--user-bubble); border: none; color: white;
            width: 40px; height: 40px; border-radius: 10px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        #settings-panel {
            background: var(--card-color); padding: 20px; border-bottom: 1px solid var(--border-subtle);
            display: none; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;
        }

        .input-field label { display: block; font-size: 11px; margin-bottom: 5px; color: var(--accent-blue); }
        .input-field input { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid var(--border-subtle); background: var(--bg-color); color: white; }

        #chat-viewport {
            flex: 1; overflow-y: auto; padding: 20px 10%;
            display: flex; flex-direction: column; gap: 25px; scroll-behavior: smooth;
        }

        .msg-container { display: flex; flex-direction: column; max-width: 100%; animation: fadeIn 0.3s ease; }
        .user-align { align-self: flex-start; }
        .bot-align { align-self: flex-end; width: 100%; align-items: flex-end; }

        .bubble {
            padding: 18px 22px; border-radius: 22px; font-size: 15.5px; line-height: 1.8;
            word-wrap: break-word; position: relative; max-width: 92%;
        }

        .user-align .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; border: 1px solid var(--border-subtle); }
        .bot-align .bubble { background: var(--card-color); border-bottom-left-radius: 4px; border: 1px solid var(--border-subtle); }

        /* --- تنسيق الأكواد (مطابق للصورة) --- */
        .bubble pre {
            background: var(--code-bg) !important;
            border-radius: 12px; margin: 15px 0 !important;
            border: 1px solid var(--border-subtle); overflow: hidden;
            direction: ltr;
        }

        /* شريط عنوان الكود القادم من بايثون */
        .bubble [class*="header"], .bubble .code-header {
            background: #2d2f31 !important;
            padding: 10px 16px !important;
            display: flex; justify-content: space-between; align-items: center;
            color: #ccc; font-size: 13px; font-family: monospace;
            border-bottom: 1px solid var(--border-subtle);
        }

        code[class*="language-"] {
            background: transparent !important;
            font-size: 14px !important;
            text-shadow: none !important;
            display: block; padding: 15px;
        }

        /* تنسيق أزرار النسخ داخل الأكواد */
        .bubble pre button {
            background: #444746; border: none; color: white;
            padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px;
        }

        .msg-actions { display: flex; gap: 15px; margin-top: 8px; padding: 0 10px; }
        .action-link { font-size: 12px; color: var(--accent-blue); cursor: pointer; font-weight: 500; opacity: 0.8; }
        .action-link:hover { opacity: 1; }

        .footer-area {
            flex-shrink: 0; padding: 20px; background: var(--bg-color);
            display: flex; flex-direction: column; align-items: center;
        }

        #status-bar { font-size: 12px; margin-bottom: 10px; color: var(--accent-blue); display: none; }

        .input-container {
            width: 100%; max-width: 800px; background: var(--user-bubble);
            border: 1px solid var(--border-subtle); border-radius: 28px;
            display: flex; align-items: center; padding: 5px 15px;
        }

        textarea {
            flex: 1; background: transparent; border: none; color: white;
            padding: 12px; font-size: 15px; resize: none; outline: none; max-height: 150px;
        }

        .send-btn {
            background: var(--accent-blue); color: #000; border: none;
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .send-btn:disabled { opacity: 0.3; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div class="logo">Gemini AAPI Pro</div>
    <div class="nav-tools">
        <button class="tool-btn" onclick="toggleSettings()">⚙️</button>
    </div>
</header>

<div id="settings-panel">
    <div class="input-field">
        <label>GitHub Token</label>
        <input type="password" id="ghToken" placeholder="ghp_xxxx">
    </div>
    <div class="input-field">
        <label>المستودع (User/Repo)</label>
        <input type="text" id="ghRepo" placeholder="username/repo">
    </div>
</div>

<div id="chat-viewport">
    <div class="msg-container bot-align">
        <div class="bubble">مرحباً! أنا مساعدك الذكي. لقد تم ضبط الألوان والتنسيقات لتطابق تجربة Gemini الأصلية تماماً. كيف يمكنني مساعدتك اليوم؟</div>
    </div>
</div>

<div class="footer-area">
    <div id="status-bar">جاري استخراج الرد من الأكشن...</div>
    <div class="input-container">
        <textarea id="promptInput" rows="1" placeholder="اسأل Gemini..." oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="startProcess()">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    // إعدادات الذاكرة المحلية
    window.onload = () => {
        document.getElementById('ghToken').value = localStorage.getItem('cfg_token') || '';
        document.getElementById('ghRepo').value = localStorage.getItem('cfg_repo') || '';
    };

    function toggleSettings() {
        const p = document.getElementById('settings-panel');
        p.style.display = (p.style.display === 'grid') ? 'none' : 'grid';
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    // عرض الرسائل ومعالجة الأكواد
    function createMessage(text, side) {
        const viewport = document.getElementById('chat-viewport');
        const container = document.createElement('div');
        container.className = `msg-container ${side}-align`;
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        
        if (side === 'bot') {
            bubble.innerHTML = text; // استقبال HTML القادم من بايثون

            // تلوين الأكواد باستخدام Prism بعد الحقن
            setTimeout(() => {
                bubble.querySelectorAll('pre code').forEach((block) => {
                    Prism.highlightElement(block);
                });
            }, 50);
        } else {
            bubble.innerText = text;
        }
        
        container.appendChild(bubble);

        if(side === 'bot') {
            const actions = document.createElement('div');
            actions.className = 'msg-actions';
            actions.innerHTML = `<span class="action-link" onclick="copyFull(this)">📋 نسخ الرد</span>`;
            container.appendChild(actions);
        }

        viewport.appendChild(container);
        viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' });
    }

    async function copyFull(el) {
        const text = el.parentElement.previousElementSibling.innerText;
        await navigator.clipboard.writeText(text);
        el.innerText = "✅ تم النسخ";
        setTimeout(() => el.innerText = "📋 نسخ الرد", 2000);
    }

    // نظام GitHub Actions
    async function startProcess() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        const prompt = document.getElementById('promptInput').value.trim();

        if(!token || !repo || !prompt) return alert("اكمل البيانات أولاً!");

        localStorage.setItem('cfg_token', token);
        localStorage.setItem('cfg_repo', repo);

        createMessage(prompt, 'user');
        document.getElementById('promptInput').value = '';
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('status-bar').style.display = 'block';

        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/workflows/gemini_api.yml/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ ref: 'main', inputs: { prompt: prompt } })
            });
            if(!res.ok) throw new Error("فشل طلب الأكشن");
            checkStatus(repo, token);
        } catch (e) {
            createMessage("❌ خطأ: " + e.message, 'bot');
            resetUI();
        }
    }

    async function checkStatus(repo, token) {
        const interval = setInterval(async () => {
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs?per_page=1`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const run = data.workflow_runs[0];

            if(run && run.status === "completed") {
                clearInterval(interval);
                fetchArtifact(repo, run.id, token);
            }
        }, 5000);
    }

    async function fetchArtifact(repo, runId, token) {
        try {
            const res = await fetch(`https://api.github.com/repos/${repo}/actions/runs/${runId}/artifacts`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const art = data.artifacts.find(a => a.name === 'gemini-json');
            
            const zipRes = await fetch(art.archive_download_url, { headers: { 'Authorization': `Bearer ${token}` } });
            const blob = await zipRes.blob();
            const zip = await JSZip.loadAsync(blob);
            const jsonStr = await zip.file("result.json").async("string");
            
            createMessage(JSON.parse(jsonStr).response, 'bot');
        } catch (e) {
            createMessage("❌ خطأ في جلب النتيجة", 'bot');
        } finally {
            resetUI();
        }
    }

    function resetUI() {
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('status-bar').style.display = 'none';
    }
</script>
</body>
</html>
