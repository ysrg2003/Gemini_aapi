name: Gemini Simple API
on:
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        type: string

jobs:
  run-system:
    runs-on: ubuntu-latest
    timeout-minutes: 5 
    
    steps:
      - name: 🏁 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ الإقلاع الخارق (Extreme Speed Execution)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/browsers
          CAMOUFOX_CACHE_DIR: /home/runner/.cache/camoufox
        run: |
          echo "📥 جاري سحب وفك الترسانة..."
          # تحميل وفك الضغط مباشرة في المجلد الحالي
          gh release download v1.0.0 -p "vendor_assets.tar.zst" -O - | tar -I zstd -xf -
          
          echo "⚙️ إعداد الروابط والبيئة..."
          # إعداد الكاش في مسار النظام
          mkdir -p /home/runner/.cache
          ln -sfn ${{ github.workspace }}/camoufox_cache /home/runner/.cache/camoufox
          
          # منح صلاحيات التنفيذ للمتصفح
          chmod +x browsers/chromium_headless_shell-1208/chrome-headless-shell 2>/dev/null || true
          
          echo "🚀 انطلاق المحرك الرئيسي..."
          # الخدعة الكبرى: إجبار بايثون على إضافة مجلد python للمسارات قبل تشغيل الكود
          # سنستخدم خيار -c لتعديل sys.path برمجياً قبل استدعاء ملفك
          python3 -c "import sys, os; sys.path.insert(0, os.path.join(os.getcwd(), 'python')); import main" "${{ github.event.inputs.prompt }}"

      - name: 📤 Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-json
          path: result.json
