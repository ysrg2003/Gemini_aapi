name: Gemini Simple API
on:
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        type: string

jobs:
  run-system:
    runs-on: ubuntu-latest
    steps:
      - name: 🏁 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ الإقلاع الذكي والمضمون
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/browsers
          CAMOUFOX_CACHE_DIR: /home/runner/.cache/camoufox
        run: |
          echo "📥 جاري سحب وفك الترسانة..."
          gh release download v1.0.0 -p "vendor_assets.tar.zst" -O - | tar -I zstd -xf -
          
          echo "🔍 البحث عن موقع المكتبات الفعلي..."
          # هذا السطر سيبحث عن مجلد camoufox ويستخرج مساره الأب
          REAL_PATH=$(find $(pwd) -name "camoufox" -type d -not -path "*/camoufox/camoufox*" | head -n 1 | xargs dirname)
          
          if [ -z "$REAL_PATH" ]; then
            echo "❌ كارثة: لم يتم العثور على مجلد camoufox في أي مكان!"
            ls -R
            exit 1
          fi
          
          echo "📍 تم العثور على المكتبات في: $REAL_PATH"
          export PYTHONPATH="$REAL_PATH"
          
          echo "⚙️ إعداد الروابط..."
          mkdir -p /home/runner/.cache
          ln -sfn ${{ github.workspace }}/camoufox_cache /home/runner/.cache/camoufox
          chmod +x browsers/chromium_headless_shell-1208/chrome-headless-shell 2>/dev/null || true
          
          echo "🚀 انطلاق المحرك الرئيسي..."
          python3 main.py "${{ github.event.inputs.prompt }}"

      - name: 📤 Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-json
          path: result.json
