name: Gemini Simple API
on:
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        type: string

jobs:
  run-system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Download & Inject Assets
        # هذه الخطوة تسحب ملف الـ 323MB وتفكه في أقل من 10 ثوانٍ
        run: |
          echo "📥 سحب ملفات المحرك من الـ Release..."
          gh release download v1.0.0 -p "vendor_assets.zip"
          unzip -qo vendor_assets.zip
          # تفعيل صلاحيات التنفيذ للمحركات
          chmod -R +x camoufox_cache/ 2>/dev/null || true
          chmod -R +x browsers/ 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run
        env:
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
          # إضافة مجلد المكتبات المستخرج للمسار
          PYTHONPATH: ${{ github.workspace }}/python
          # إخبار Playwright بمكان المتصفحات المستخرجة
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/browsers
        run: |
          echo "🚀 تشغيل الأتمتة..."
          python main.py "${{ github.event.inputs.prompt }}"

      - name: Result
        uses: actions/upload-artifact@v4
        with:
          name: gemini-json
          path: result.json
