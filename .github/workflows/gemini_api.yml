name: Gemini High Speed API

on:
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        type: string

jobs:
  run-system:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      actions: write

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Download Engine Assets
        run: |
          echo "📥 جاري سحب الترسانة v1.0.0..."
          gh release download v1.0.0 -p "vendor_assets.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🗜️ Fast Injection
        run: |
          echo "🔓 فك الضغط والحقن المباشر..."
          # فك المجلدات الثلاثة الأساسية
          unzip -qo vendor_assets.zip
          
          # إنشاء مسارات النظام الافتراضية
          mkdir -p /home/runner/.cache/camoufox
          mkdir -p /home/runner/.cache/ms-playwright
          
          # نقل المحتويات للأماكن التي يتوقعها النظام
          echo "🚚 نقل الملفات إلى الكاش..."
          cp -rn camoufox_cache/* /home/runner/.cache/camoufox/ 2>/dev/null || true
          cp -rn browsers/* /home/runner/.cache/ms-playwright/ 2>/dev/null || true
          
          echo "✅ تم تجهيز المحركات والمكتبات."

      - name: 🛡️ Fix Permissions
        run: |
          echo "🔑 تفعيل صلاحيات التنفيذ..."
          chmod -R +x /home/runner/.cache/camoufox/ 2>/dev/null || true
          chmod -R +x /home/runner/.cache/ms-playwright/ 2>/dev/null || true

      - name: ⚡ Execute Gemini Automation
        env:
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
          # توجيه بايثون لمجلد المكتبات المستخرج
          PYTHONPATH: ${{ github.workspace }}/python
          # توجيه Playwright و Camoufox للكاش المحقون
          PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright
          CAMOUFOX_CACHE_DIR: /home/runner/.cache/camoufox
        run: |
          echo "🚀 تشغيل المحرك الأساسي..."
          python main.py "${{ github.event.inputs.prompt }}"

      - name: 📄 Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-json
          path: result.json
          retention-days: 1
