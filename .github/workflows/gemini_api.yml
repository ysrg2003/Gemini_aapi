name: Gemini High Speed API

on:
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        type: string

jobs:
  run-system:
    runs-on: ubuntu-latest
    
    # الصلاحيات اللازمة للتعامل مع الـ Releases والـ Artifacts
    permissions:
      contents: read
      actions: write

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --- 🚀 المرحلة الأهم: جلب الترسانة الجاهزة ---
      - name: 📥 Download Engine Assets
        run: |
          echo "📥 جاري تحميل الترسانة من الـ Release v1.0.0..."
          gh release download v1.0.0 -p "vendor_assets.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🗜️ Fast Unzip Assets
        run: |
          echo "🔓 فك ضغط المحركات والمكتبات..."
          # فك الضغط إلى المجلد الذي يتوقعه ملف main.py
          unzip -qn vendor_assets.zip -d vendor_extracted
          # حذف الملف المضغوط فوراً لتوفير مساحة الرام والقرص
          rm vendor_assets.zip

      # --- 🔑 منح صلاحيات التنفيذ للمحركات ---
      - name: 🛡️ Fix Executable Permissions
        run: |
          echo "🔑 تفعيل صلاحيات المحركات..."
          # نمنح صلاحية التنفيذ لكل ما هو داخل مجلد browsers و camoufox_cache
          find vendor_extracted/browsers -type f -exec chmod +x {} +
          find vendor_extracted/camoufox_cache -type f -exec chmod +x {} +
          # التأكد من صلاحيات تنفيذ بايثون والمكتبات إذا لزم الأمر
          chmod -R +x vendor_extracted/python || true

      # --- 🤖 تشغيل المحرك الأساسي ---
      - name: ⚡ Execute Gemini Automation
        env:
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
          # التأكد من أن البيئة تعرف مكان المجلد المستخرج
          PYTHONPATH: ${{ github.workspace }}/vendor_extracted/python
        run: |
          python main.py "${{ github.event.inputs.prompt }}"

      # --- 📤 رفع النتيجة النهائية ---
      - name: 📄 Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-json
          path: result.json
          retention-days: 1 # صلاحية الملف يوم واحد فقط لتوفير المساحة
